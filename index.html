<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>less. | Pure Entertainment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-nav">
        <div class="brand-logo">less<span>.</span></div>
        <div class="nav-hints">
            <span class="hint-left"><i class="fa-solid fa-angles-right"></i> Menu</span>
            <span class="hint-right">Movies <i class="fa-solid fa-angles-left"></i></span>
        </div>
    </div>

    <div id="leftSidebar" class="sidebar left-sidebar">
        <div class="sidebar-header">
            <h3>Categories</h3>
            <button onclick="closeSidebars()" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sidebar-menu">
            <button class="cat-btn" id="btn-all" onclick="setCategory('all', this)">🔥 All Videos</button>
            <button class="cat-btn active" id="btn-shorts" onclick="setCategory('shorts', this)">📱 Shorts</button>
            <button class="cat-btn" id="btn-movie" onclick="setCategory('movie', this)">🎬 Movies</button>
            <button class="cat-btn" id="btn-actress" onclick="setCategory('actress', this)">💃 Actresses</button>
        </div>
    </div>

    <div id="rightMoviesSidebar" class="sidebar right-sidebar">
        <div class="sidebar-header">
            <button onclick="closeSidebars()" class="close-btn"><i class="fa-solid fa-arrow-left"></i></button>
            <h3>Movie Catalogue</h3>
        </div>
        <div class="video-grid" id="moviesCatalogueGrid"></div>
    </div>

    <div id="sidebarOverlay" onclick="closeSidebars()"></div>

    <div class="less-feed" id="mainFeed">
        <div id="no-results">No videos found.</div>
    </div>

    <div id="profileOverlay" class="profile-overlay">
        <div class="profile-header">
            <button class="back-btn" onclick="closeProfile()"><i class="fa-solid fa-arrow-left"></i></button>
            <span id="profileNameHeader" class="profile-name-top">Actor Name</span>
        </div>
        <div class="profile-info">
            <img id="profilePic" src="" alt="Profile">
            <div class="profile-stats">
                <h2 id="profileName">Name</h2>
                <p id="profileBio">Bio goes here</p>
            </div>
        </div>
        
        <div class="profile-section-title">Recent Shorts</div>
        <div class="video-grid" id="profileShortsGrid"></div>
        <div class="profile-section-title" style="margin-top: 20px;">Featured Movies</div>
        <div class="video-grid" id="profileMoviesGrid"></div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    
    <script src="data.js"></script> 
    <script src="app.js"></script>
</body>
</html>
